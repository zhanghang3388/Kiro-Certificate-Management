<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiro 凭证管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; padding: 2rem; color: #1f2937; }
    .container { max-width: 1280px; margin: 0 auto; }
    h1 { margin-bottom: 1.5rem; }
    h3 { margin-bottom: 1rem; font-size: 1.05rem; }
    .card { background: #fff; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    label { display: block; margin-bottom: 0.4rem; font-weight: 500; color: #555; font-size: 0.9rem; }
    input[type="text"], input[type="password"], input[type="file"] { width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.95rem; }
    input[type="file"] { padding: 0.45rem; background: #fafafa; }
    button { background: #4f46e5; color: #fff; border: none; padding: 0.55rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.88rem; transition: background .15s; }
    button:hover { background: #4338ca; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    button.secondary { background: #6b7280; }
    button.secondary:hover { background: #4b5563; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    button.ghost { background: transparent; color: #4f46e5; padding: 0.3rem 0.55rem; }
    button.ghost:hover { background: #eef2ff; }
    button.ghost.danger { color: #dc2626; }
    button.ghost.danger:hover { background: #fef2f2; }
    .row { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }
    .result { margin-top: 1rem; padding: 0.9rem; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 6px; word-break: break-all; font-size: 0.9rem; }
    .result.error { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .result strong { font-family: ui-monospace, Menlo, Consolas, monospace; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.88rem; }
    th, td { padding: 0.55rem 0.6rem; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f9fafb; font-weight: 600; color: #555; }
    tr.used td { color: #9ca3af; }
    .status-used { color: #ef4444; font-weight: 500; }
    .status-unused { color: #16a34a; font-weight: 500; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; gap: 0.6rem; flex-wrap: wrap; }
    .selection-info { font-size: 0.88rem; color: #555; }
    .key-cell { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 0.78rem; color: #555; }
    .copy-btn { background: #6b7280; padding: 0.25rem 0.55rem; font-size: 0.75rem; margin-left: 0.4rem; }
    .copy-btn:hover { background: #4b5563; }
    .empty { padding: 2rem; color: #888; text-align: center; }

    /* ===== 卡片网格 ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }
    .acct {
      position: relative;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 1rem;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s, transform .15s;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .acct:hover { box-shadow: 0 4px 14px rgba(0,0,0,.08); }
    .acct.selected { border-color: #4f46e5; background: #eef2ff; }
    .acct.used { opacity: 0.55; cursor: not-allowed; }
    .acct.error-card { border-color: #fca5a5; background: #fff7f7; }

    .acct-head {
      display: flex; align-items: flex-start; gap: 0.6rem;
    }
    .checkbox {
      width: 18px; height: 18px; border: 2px solid #d1d5db; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
      transition: background .15s, border-color .15s;
    }
    .acct.selected .checkbox { background: #4f46e5; border-color: #4f46e5; color: #fff; }
    .checkbox svg { width: 12px; height: 12px; display: none; }
    .acct.selected .checkbox svg { display: block; }
    .acct-title { flex: 1; min-width: 0; }
    .acct-email {
      font-weight: 600; font-size: 0.95rem; color: #111827;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .acct-id { font-size: 0.72rem; color: #9ca3af; margin-top: 2px; }

    .badges { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 500;
    }
    .badge.region   { background: #f3f4f6; color: #4b5563; }
    .badge.provider { background: #ecfeff; color: #0e7490; }
    .badge.sub-pro       { background: #dbeafe; color: #1d4ed8; }
    .badge.sub-pro-plus  { background: #ede9fe; color: #6d28d9; }
    .badge.sub-power     { background: #fef3c7; color: #b45309; }
    .badge.sub-free      { background: #f3f4f6; color: #4b5563; }

    .status-row { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .status {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 600;
    }
    .status.active     { background: #dcfce7; color: #15803d; }
    .status.expired    { background: #fee2e2; color: #b91c1c; }
    .status.error      { background: #fef3c7; color: #b45309; }
    .status.refreshing { background: #dbeafe; color: #1d4ed8; }
    .status.unknown    { background: #f3f4f6; color: #6b7280; }
    .status.used       { background: #f3f4f6; color: #9ca3af; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .status.refreshing .dot { animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }

    .meta { font-size: 0.78rem; color: #6b7280; }
    .meta .label { color: #9ca3af; margin-right: 4px; }
    .acct-error { font-size: 0.72rem; color: #b91c1c; word-break: break-word; max-height: 36px; overflow: hidden; }

    .acct-actions {
      display: flex; gap: 0.35rem; justify-content: flex-end; flex-wrap: wrap;
      border-top: 1px solid #f3f4f6; padding-top: 0.55rem;
    }

    /* ===== Modal ===== */
    .modal-mask {
      position: fixed; inset: 0; background: rgba(15, 23, 42, .55);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 1rem;
    }
    .modal {
      background: #fff; border-radius: 12px; max-width: 720px; width: 100%;
      max-height: 90vh; overflow: auto; box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .modal-head {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.25rem; border-bottom: 1px solid #f3f4f6;
    }
    .modal-head h3 { margin: 0; }
    .modal-body { padding: 1.25rem; }
    .modal-foot {
      padding: .75rem 1.25rem; border-top: 1px solid #f3f4f6;
      display: flex; justify-content: flex-end; gap: .5rem;
    }
    .modal-close {
      background: transparent; color: #6b7280; padding: .25rem .5rem;
    }
    .modal-close:hover { background: #f3f4f6; color: #111827; }

    .plans { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: .75rem; }
    .plan {
      border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 1rem;
      cursor: pointer; transition: border-color .15s, box-shadow .15s, transform .15s;
      display: flex; flex-direction: column; gap: .35rem;
    }
    .plan:hover { border-color: #4f46e5; box-shadow: 0 4px 14px rgba(79,70,229,.15); }
    .plan.loading { opacity: .6; cursor: wait; }
    .plan-title { font-weight: 700; font-size: 1rem; color: #111827; }
    .plan-price { font-size: 1.2rem; color: #4f46e5; font-weight: 700; }
    .plan-features { font-size: .78rem; color: #6b7280; }
    .plan-features li { margin-left: 1rem; }

    .toggle { display: inline-flex; align-items: center; gap: .5rem; font-size: .9rem; color: #374151; }
    .toggle input { width: 18px; height: 18px; }
    .field { display: flex; flex-direction: column; gap: .35rem; margin-bottom: .8rem; }
    .field label { margin: 0; }
    .hint { font-size: .78rem; color: #6b7280; }
    .ok-text { color: #15803d; font-size: .85rem; }
    .err-text { color: #b91c1c; font-size: .85rem; }
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
      <h1 style="margin:0;">Kiro 凭证管理后台</h1>
      <button class="secondary" onclick="logout()">退出登录</button>
    </div>

    <div class="card">
      <h3>系统设置 · 比特指纹浏览器</h3>
      <div class="hint" style="margin-bottom:.8rem; padding:.6rem; background:#fef9c3; border-radius:6px; color:#854d0e;">
        <strong>注意：</strong>开窗动作由你打开本页的浏览器 JS 直接调用本机比特浏览器 API。
        因此把服务部署到 VPS 后, 必须由<strong>你本机</strong>装好比特浏览器才会生效。
        如果浏览器拦截 mixed-content 或 CORS, 请用 http 访问本管理页, 或在比特里关掉跨域限制。
      </div>
      <label class="toggle" style="margin-bottom: .8rem;">
        <input type="checkbox" id="bitEnabled">
        启用：开通订阅时自动调用本机比特浏览器开窗
      </label>
      <div class="field">
        <label>本地 API 地址（仅你本机能访问）</label>
        <input type="text" id="bitApi" placeholder="http://127.0.0.1:54345">
        <div class="hint">默认 127.0.0.1:54345。装好客户端后在「系统设置」里能看到实际端口。</div>
      </div>
      <div class="field">
        <label>分组 ID（可选）</label>
        <input type="text" id="bitGroupId" placeholder="留空表示默认分组">
      </div>
      <div class="row">
        <button onclick="saveBitSettings()">保存设置</button>
        <button class="secondary" onclick="testBitBrowser()">测试连接</button>
        <span id="bitStatus" class="hint"></span>
      </div>
    </div>

    <div class="card">
      <h3>上传账号 JSON 文件</h3>
      <div class="row">
        <input type="file" id="fileInput" accept="application/json,.json" style="flex:1; min-width: 240px;">
        <button onclick="uploadFile()">上传并解析</button>
      </div>
      <div id="uploadResult"></div>
    </div>

    <div class="card">
      <h3>账号列表</h3>
      <div class="row">
        <button onclick="loadAccounts()">刷新列表</button>
        <button class="secondary" onclick="toggleSelectAll()">全选 / 反选未使用</button>
        <button class="secondary" onclick="refreshAll()">一键保活全部</button>
      </div>
      <div id="accountsContainer"></div>
      <div class="toolbar">
        <div class="selection-info" id="selectionInfo">已选 0 个</div>
        <button id="genKeyBtn" onclick="generateKey()" disabled>生成下载密钥</button>
      </div>
      <div id="genKeyResult"></div>
    </div>

    <div class="card">
      <h3>已生成密钥</h3>
      <button onclick="loadKeys()">刷新</button>
      <div id="keysContainer"></div>
    </div>
  </div>

  <div id="modalRoot"></div>

  <script>
    const ADMIN_KEY_STORAGE = 'kiro_admin_key';
    const accountsState = { rows: [], selected: new Set() };

    function getKey() { return localStorage.getItem(ADMIN_KEY_STORAGE) || ''; }
    function logout() { localStorage.removeItem(ADMIN_KEY_STORAGE); location.replace('/login.html'); }
    function requireLogin() {
      if (!getKey()) { location.replace('/login.html'); return false; }
      return true;
    }
    function handleAuthFailure(res) {
      if (res.status === 401) {
        localStorage.removeItem(ADMIN_KEY_STORAGE);
        location.replace('/login.html');
        return true;
      }
      return false;
    }
    function authHeaders(extra = {}) { return { 'x-admin-key': getKey(), ...extra }; }

    function showResult(elId, msg, isError = false) {
      const el = document.getElementById(elId);
      el.className = isError ? 'result error' : 'result';
      el.innerHTML = msg;
    }

    async function uploadFile() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return alert('请选择文件');
      const form = new FormData();
      form.append('file', file);
      try {
        const res = await fetch('/api/admin/upload', {
          method: 'POST', headers: authHeaders(), body: form
        });
        if (handleAuthFailure(res)) return;
        const data = await res.json();
        if (res.ok) {
          showResult('uploadResult', `已导入 <strong>${data.inserted}</strong> 个账号${data.skipped ? `, 跳过 ${data.skipped} 个无效项` : ''}, 正在后台保活…`);
          loadAccounts();
          // 几秒后再拉一次, 让保活结果展示出来
          setTimeout(loadAccounts, 4000);
        } else {
          showResult('uploadResult', data.error || '上传失败', true);
        }
      } catch (e) {
        showResult('uploadResult', '请求失败', true);
      }
    }

    async function loadAccounts() {
      try {
        const res = await fetch('/api/admin/accounts', { headers: authHeaders() });
        if (handleAuthFailure(res)) return;
        if (!res.ok) {
          document.getElementById('accountsContainer').innerHTML = '<div class="empty">加载失败</div>';
          return;
        }
        accountsState.rows = await res.json();
        // 清理掉不存在或已使用的选中项
        const existing = new Set(accountsState.rows.filter(r => !r.used).map(r => r.id));
        for (const id of [...accountsState.selected]) {
          if (!existing.has(id)) accountsState.selected.delete(id);
        }
        renderAccounts();
      } catch (e) {
        document.getElementById('accountsContainer').innerHTML = '<div class="empty">请求失败</div>';
      }
    }

    function subscriptionBadgeClass(text) {
      const t = (text || '').toUpperCase();
      if (t.includes('PRO+') || t.includes('PRO_PLUS') || t.includes('PROPLUS')) return 'sub-pro-plus';
      if (t.includes('POWER')) return 'sub-power';
      if (t.includes('PRO')) return 'sub-pro';
      return 'sub-free';
    }

    function formatExpiry(expiresAt) {
      if (!expiresAt) return '—';
      const diff = expiresAt - Date.now();
      if (diff <= 0) return '已过期';
      const m = Math.floor(diff / 60000);
      if (m < 60) return `${m} 分钟后`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h} 小时${m % 60 ? ' ' + (m % 60) + ' 分' : ''}后`;
      const d = Math.floor(h / 24);
      return `${d} 天${h % 24 ? ' ' + (h % 24) + ' 小时' : ''}后`;
    }

    function statusInfo(r) {
      if (r.used) return { cls: 'used', text: '已使用' };
      if (r.last_status === 'refreshing') return { cls: 'refreshing', text: '刷新中' };
      if (r.last_status === 'error') return { cls: 'error', text: '错误' };
      if (r.expires_at && r.expires_at <= Date.now()) return { cls: 'expired', text: '已过期' };
      if (r.last_status === 'active') return { cls: 'active', text: '正常' };
      return { cls: 'unknown', text: '未检测' };
    }

    function renderAccounts() {
      const rows = accountsState.rows;
      const container = document.getElementById('accountsContainer');
      if (!rows.length) {
        container.innerHTML = '<div class="empty">暂无账号, 请先上传 JSON 文件</div>';
        updateSelection();
        return;
      }
      const html = '<div class="grid">' + rows.map(r => renderCard(r)).join('') + '</div>';
      container.innerHTML = html;
      updateSelection();
    }

    function renderCard(r) {
      const selected = accountsState.selected.has(r.id);
      const sInfo = statusInfo(r);
      const isError = sInfo.cls === 'error' || sInfo.cls === 'expired';
      const subBadge = r.subscription
        ? `<span class="badge ${subscriptionBadgeClass(r.subscription)}">${esc(r.subscription)}</span>` : '';
      const regionBadge = r.region ? `<span class="badge region">${esc(r.region)}</span>` : '';
      const providerBadge = r.provider ? `<span class="badge provider">${esc(r.provider)}</span>` : '';
      const errorLine = (r.last_status === 'error' && r.last_error)
        ? `<div class="acct-error" title="${esc(r.last_error)}">${esc(r.last_error)}</div>` : '';
      return `
        <div class="acct ${selected ? 'selected' : ''} ${r.used ? 'used' : ''} ${!r.used && isError ? 'error-card' : ''}"
             data-id="${r.id}" onclick="onCardClick(event, ${r.id}, ${r.used ? 1 : 0})">
          <div class="acct-head">
            <div class="checkbox"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 8.5 7 12 13 5"/></svg></div>
            <div class="acct-title">
              <div class="acct-email" title="${esc(r.email || '')}">${esc(r.email || '(无邮箱)')}</div>
              <div class="acct-id">#${r.id} · 导入于 ${esc(r.created_at)}</div>
            </div>
          </div>
          <div class="badges">${subBadge}${regionBadge}${providerBadge}</div>
          <div class="status-row">
            <span class="status ${sInfo.cls}"><span class="dot"></span>${sInfo.text}</span>
            <span class="meta"><span class="label">过期:</span>${formatExpiry(r.expires_at)}</span>
          </div>
          ${r.last_checked_at ? `<div class="meta"><span class="label">最近检测:</span>${esc(r.last_checked_at)}</div>` : ''}
          ${r.bit_window_id ? `<div class="meta"><span class="label">比特窗口:</span><span class="key-cell">${esc(String(r.bit_window_id).slice(0, 8))}…</span></div>` : ''}
          ${r.proxy ? `<div class="meta"><span class="label">代理:</span>${esc(r.proxy.proxyType)} ${esc(r.proxy.host)}:${esc(r.proxy.port)}</div>` : ''}
          ${errorLine}
          <div class="acct-actions" onclick="event.stopPropagation()">
            ${!r.used ? `<button class="ghost" onclick="openSubscribe(${r.id})">开通订阅</button>` : ''}
            ${!r.used ? `<button class="ghost" onclick="editProxy(${r.id})">代理</button>` : ''}
            ${!r.used ? `<button class="ghost" onclick="refreshOne(${r.id})">立即保活</button>` : ''}
            <button class="ghost danger" onclick="deleteAccount(${r.id})">删除</button>
          </div>
        </div>
      `;
    }

    function onCardClick(e, id, used) {
      if (used) return;
      // 忽略 actions 区域里的点击
      if (e.target.closest('.acct-actions')) return;
      if (accountsState.selected.has(id)) accountsState.selected.delete(id);
      else accountsState.selected.add(id);
      renderAccounts();
    }

    function updateSelection() {
      const count = accountsState.selected.size;
      document.getElementById('selectionInfo').textContent = `已选 ${count} 个`;
      document.getElementById('genKeyBtn').disabled = count === 0;
    }

    function toggleSelectAll() {
      const usable = accountsState.rows.filter(r => !r.used);
      const allSelected = usable.length > 0 && usable.every(r => accountsState.selected.has(r.id));
      if (allSelected) {
        usable.forEach(r => accountsState.selected.delete(r.id));
      } else {
        usable.forEach(r => accountsState.selected.add(r.id));
      }
      renderAccounts();
    }

    async function refreshOne(id) {
      try {
        const res = await fetch(`/api/admin/accounts/${id}/refresh`, {
          method: 'POST', headers: authHeaders()
        });
        if (handleAuthFailure(res)) return;
        const data = await res.json().catch(() => ({}));
        if (!res.ok) alert(data.error || '保活失败');
        loadAccounts();
      } catch (e) {
        alert('请求失败');
      }
    }

    async function refreshAll() {
      if (!confirm('对所有未使用账号执行保活刷新?')) return;
      try {
        const res = await fetch('/api/admin/accounts/refresh-all', {
          method: 'POST', headers: authHeaders()
        });
        if (handleAuthFailure(res)) return;
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          alert(`完成: 共 ${data.total} 个, 成功 ${data.ok}, 失败 ${data.fail}`);
        } else {
          alert(data.error || '操作失败');
        }
        loadAccounts();
      } catch (e) {
        alert('请求失败');
      }
    }

    async function deleteAccount(id) {
      if (!confirm('确认删除该账号?')) return;
      try {
        const res = await fetch(`/api/admin/accounts/${id}`, {
          method: 'DELETE', headers: authHeaders()
        });
        if (handleAuthFailure(res)) return;
        if (res.ok) {
          accountsState.selected.delete(id);
          loadAccounts();
        } else {
          const data = await res.json().catch(() => ({}));
          alert(data.error || '删除失败');
        }
      } catch (e) {
        alert('请求失败');
      }
    }

    async function generateKey() {
      const ids = [...accountsState.selected];
      if (!ids.length) return;
      try {
        const res = await fetch('/api/admin/generate-key', {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ accountIds: ids })
        });
        if (handleAuthFailure(res)) return;
        const data = await res.json();
        if (res.ok) {
          showResult('genKeyResult',
            `下载密钥 (含 ${data.count} 个账号): <strong>${data.key}</strong>`
            + ` <button class="copy-btn" onclick="copyText('${data.key}')">复制</button>`
          );
          accountsState.selected.clear();
          loadKeys();
          loadAccounts();
        } else {
          showResult('genKeyResult', data.error || '生成失败', true);
        }
      } catch (e) {
        showResult('genKeyResult', '请求失败', true);
      }
    }

    async function loadKeys() {
      try {
        const res = await fetch('/api/admin/keys', { headers: authHeaders() });
        if (handleAuthFailure(res)) return;
        if (!res.ok) {
          document.getElementById('keysContainer').innerHTML = '<div class="empty">加载失败</div>';
          return;
        }
        const rows = await res.json();
        if (!rows.length) {
          document.getElementById('keysContainer').innerHTML = '<div class="empty">暂无密钥</div>';
          return;
        }
        let html = '<table><thead><tr><th>密钥</th><th>账号数</th><th>状态</th><th>创建时间</th><th></th></tr></thead><tbody>';
        for (const r of rows) {
          html += `<tr>
            <td class="key-cell">${esc(r.download_key)}</td>
            <td>${r.account_count}</td>
            <td class="${r.used ? 'status-used' : 'status-unused'}">${r.used ? '已使用' : '未使用'}</td>
            <td>${esc(r.created_at)}</td>
            <td><button class="copy-btn" onclick="copyText('${r.download_key}')">复制</button></td>
          </tr>`;
        }
        html += '</tbody></table>';
        document.getElementById('keysContainer').innerHTML = html;
      } catch (e) {
        document.getElementById('keysContainer').innerHTML = '<div class="empty">请求失败</div>';
      }
    }

    function copyText(text) { navigator.clipboard.writeText(text); }

    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // ===== 设置 =====
    async function loadSettings() {
      try {
        const res = await fetch('/api/admin/settings', { headers: authHeaders() });
        if (handleAuthFailure(res)) return;
        const s = await res.json();
        document.getElementById('bitEnabled').checked = !!s.bitbrowserEnabled;
        document.getElementById('bitApi').value = s.bitbrowserApi || '';
        document.getElementById('bitGroupId').value = s.bitbrowserGroupId || '';
        bitState.enabled = !!s.bitbrowserEnabled;
        bitState.api = s.bitbrowserApi || 'http://127.0.0.1:54345';
        bitState.groupId = s.bitbrowserGroupId || '';
      } catch (e) { /* ignore */ }
    }

    async function saveBitSettings() {
      const body = {
        bitbrowserEnabled: document.getElementById('bitEnabled').checked,
        bitbrowserApi: document.getElementById('bitApi').value.trim(),
        bitbrowserGroupId: document.getElementById('bitGroupId').value.trim()
      };
      const status = document.getElementById('bitStatus');
      status.textContent = '保存中...';
      status.className = 'hint';
      try {
        const res = await fetch('/api/admin/settings', {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(body)
        });
        if (handleAuthFailure(res)) return;
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          status.textContent = data.error || '保存失败';
          status.className = 'err-text';
          return;
        }
        bitState.enabled = body.bitbrowserEnabled;
        bitState.api = body.bitbrowserApi || 'http://127.0.0.1:54345';
        bitState.groupId = body.bitbrowserGroupId;
        status.textContent = '已保存';
        status.className = 'ok-text';
      } catch (e) {
        status.textContent = '请求失败';
        status.className = 'err-text';
      }
    }

    // ===== 比特浏览器本地 API =====
    // 在用户当前浏览器里直连 127.0.0.1, 服务部署到 VPS 后这个调用从你本机发出
    const bitState = { api: '', enabled: false, groupId: '' };

    async function bitFetch(pathname, body, timeoutMs = 8000) {
      const apiBase = (bitState.api || 'http://127.0.0.1:54345').replace(/\/+$/, '');
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), timeoutMs);
      try {
        const res = await fetch(`${apiBase}${pathname}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body || {}),
          signal: ctrl.signal
        });
        const text = await res.text();
        let parsed = {};
        try { parsed = text ? JSON.parse(text) : {}; } catch {}
        if (!res.ok) return { success: false, error: `HTTP ${res.status}: ${text.slice(0, 200)}` };
        if (parsed.success === false) return { success: false, error: parsed.msg || '比特返回失败' };
        return { success: true, data: parsed.data ?? parsed };
      } catch (e) {
        const msg = e.name === 'AbortError' ? '请求超时'
          : (e.message || '网络错误，请检查比特浏览器是否运行');
        return { success: false, error: msg };
      } finally { clearTimeout(timer); }
    }

    async function bitOpenUrl(url, name) {
      const update = await bitFetch('/browser/update', {
        name: name || `Kiro 订阅 ${new Date().toLocaleString('zh-CN')}`,
        remark: 'Kiro 凭证管理 - 自动创建',
        url,
        groupId: bitState.groupId || '',
        proxyMethod: 2,
        proxyType: 'noproxy',
        browserFingerPrint: { coreVersion: '112' }
      });
      if (!update.success) return update;
      const id = update.data?.id;
      if (!id) return { success: false, error: '未返回窗口 id' };
      const opened = await bitFetch('/browser/open', { id, queue: true }, 30000);
      if (!opened.success) return { success: false, error: opened.error, windowId: id };
      return { success: true, windowId: id };
    }

    // 复用窗口版本：传入账号信息和已有 windowId 时复用同一个比特窗口
    async function bitOpenUrlForAccount(account, url, proxy) {
      const proxyFields = (proxy && proxy.proxyType && proxy.proxyType !== 'noproxy') ? {
        proxyMethod: 2,
        proxyType: proxy.proxyType,
        host: proxy.host || '',
        port: String(proxy.port || ''),
        proxyUserName: proxy.proxyUserName || '',
        proxyPassword: proxy.proxyPassword || ''
      } : { proxyMethod: 2, proxyType: 'noproxy' };

      const payload = {
        name: `Kiro · ${account.email || account.id}`,
        remark: `Kiro 凭证 #${account.id}`,
        url,
        groupId: bitState.groupId || '',
        ...proxyFields,
        browserFingerPrint: { coreVersion: '112' }
      };

      // 复用：传 id 表示更新而非新建
      if (account.bit_window_id) {
        payload.id = account.bit_window_id;
      }

      const update = await bitFetch('/browser/update', payload);
      if (!update.success) {
        // 如果 id 失效（窗口被删了）, 去掉 id 重试一次新建
        if (account.bit_window_id) {
          delete payload.id;
          const retry = await bitFetch('/browser/update', payload);
          if (!retry.success) return retry;
          update.data = retry.data;
        } else {
          return update;
        }
      }
      const id = update.data?.id;
      if (!id) return { success: false, error: '未返回窗口 id' };

      const opened = await bitFetch('/browser/open', { id, queue: true }, 30000);
      if (!opened.success) return { success: false, error: opened.error, windowId: id };
      return { success: true, windowId: id, isNew: !account.bit_window_id || account.bit_window_id !== id };
    }

    async function testBitBrowser() {
      bitState.api = document.getElementById('bitApi').value.trim() || 'http://127.0.0.1:54345';
      const status = document.getElementById('bitStatus');
      status.textContent = '测试中...';
      status.className = 'hint';
      const r = await bitFetch('/health', {}, 3000);
      if (r.success) {
        status.textContent = `连接成功: ${bitState.api}`;
        status.className = 'ok-text';
      } else {
        status.textContent = r.error;
        status.className = 'err-text';
      }
    }

    // ===== 弹窗工具 =====
    function showModal(html) {
      const root = document.getElementById('modalRoot');
      root.innerHTML = `<div class="modal-mask" onclick="if(event.target===this) closeModal()"><div class="modal">${html}</div></div>`;
    }
    function closeModal() { document.getElementById('modalRoot').innerHTML = ''; }

    // ===== 订阅流程 =====
    async function openSubscribe(accountId) {
      showModal(`
        <div class="modal-head">
          <h3>开通订阅</h3>
          <button class="modal-close" onclick="closeModal()">关闭</button>
        </div>
        <div class="modal-body" id="subBody">
          <div class="hint">正在拉取可用套餐...</div>
        </div>
      `);
      try {
        const res = await fetch(`/api/admin/accounts/${accountId}/subscriptions`, { headers: authHeaders() });
        if (handleAuthFailure(res)) return;
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          renderSubError(accountId, data.error || '获取订阅列表失败');
          return;
        }
        renderPlans(accountId, data.plans || [], data.disclaimer || []);
      } catch (e) {
        renderSubError(accountId, '请求失败');
      }
    }

    function renderSubError(accountId, msg) {
      const body = document.getElementById('subBody');
      if (!body) return;
      body.innerHTML = `
        <div class="err-text" style="margin-bottom:.8rem;">${esc(msg)}</div>
        <div class="hint">如需直接获取管理链接, 可点击下方按钮:</div>
        <div style="margin-top:.6rem;">
          <button onclick="fetchSubUrl(${accountId}, null)">获取订阅管理链接</button>
        </div>
      `;
    }

    function renderPlans(accountId, plans, disclaimer) {
      const body = document.getElementById('subBody');
      if (!body) return;
      if (!plans.length) {
        body.innerHTML = `
          <div class="hint" style="margin-bottom:.8rem;">该账号当前没有可用的升级套餐, 可直接获取订阅管理链接:</div>
          <button onclick="fetchSubUrl(${accountId}, null)">获取订阅管理链接</button>
        `;
        return;
      }
      const cards = plans.map(p => {
        const title = p.description?.title || p.name;
        const price = p.pricing
          ? `${p.pricing.currency || ''} ${(p.pricing.amount || 0).toFixed(2)}/${p.description?.billingInterval || ''}`
          : '';
        const features = (p.description?.features || []).slice(0, 5)
          .map(f => `<li>${esc(f)}</li>`).join('');
        return `
          <div class="plan" id="plan_${esc(p.qSubscriptionType || p.name)}"
               onclick="fetchSubUrl(${accountId}, '${esc(p.qSubscriptionType || p.name)}')">
            <div class="plan-title">${esc(title)}</div>
            <div class="plan-price">${esc(price)}</div>
            ${p.description?.featureHeader ? `<div class="hint">${esc(p.description.featureHeader)}</div>` : ''}
            <ul class="plan-features">${features}</ul>
          </div>
        `;
      }).join('');
      const disc = disclaimer.length
        ? `<div class="hint" style="margin-top:.8rem;">${disclaimer.map(esc).join('<br>')}</div>` : '';
      body.innerHTML = `
        <div class="plans">${cards}</div>
        ${disc}
        <div id="subResult" style="margin-top:.8rem;"></div>
      `;
    }

    async function fetchSubUrl(accountId, subscriptionType) {
      const result = document.getElementById('subResult') || document.getElementById('subBody');
      if (subscriptionType) {
        const card = document.getElementById(`plan_${subscriptionType}`);
        if (card) card.classList.add('loading');
      }
      result.innerHTML = '<div class="hint">正在获取支付链接...</div>';
      try {
        const res = await fetch(`/api/admin/accounts/${accountId}/subscription-url`, {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ subscriptionType })
        });
        if (handleAuthFailure(res)) return;
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          result.innerHTML = `<div class="err-text">${esc(data.error || '获取失败')}</div>`;
          return;
        }
        const link = data.url;
        await navigator.clipboard.writeText(link).catch(() => {});

        let bitMsg = '';
        if (bitState.enabled) {
          result.innerHTML = `<div class="hint">支付链接已复制, 正在调用本机比特浏览器开窗...</div>`;
          const account = accountsState.rows.find(r => r.id === accountId) || { id: accountId };

          // 拉账号代理（含密码）
          let proxy = null;
          try {
            const pr = await fetch(`/api/admin/accounts/${accountId}/proxy-detail`, { headers: authHeaders() });
            if (pr.ok) proxy = (await pr.json()).proxy;
          } catch {}

          const opened = await bitOpenUrlForAccount(account, link, proxy);
          if (opened.success) {
            bitMsg = `<div class="ok-text">已在本机比特浏览器中打开 (window: ${esc(String(opened.windowId).slice(0, 8))}…)</div>`;
            // 第一次开窗 / 窗口 id 变了 → 写回数据库
            if (account.bit_window_id !== opened.windowId) {
              await fetch(`/api/admin/accounts/${accountId}/bit-window`, {
                method: 'PUT',
                headers: authHeaders({ 'Content-Type': 'application/json' }),
                body: JSON.stringify({ windowId: opened.windowId })
              }).catch(() => {});
              loadAccounts();
            }
          } else {
            bitMsg = `<div class="err-text">比特调用失败: ${esc(opened.error)}, 已降级为复制链接</div>`;
          }
        }

        result.innerHTML = `
          <div class="ok-text">支付链接已复制到剪贴板</div>
          ${bitMsg}
          <div style="margin-top:.5rem; word-break:break-all;">
            <a href="${esc(link)}" target="_blank" rel="noopener">${esc(link)}</a>
          </div>
        `;
      } catch (e) {
        result.innerHTML = '<div class="err-text">请求失败</div>';
      } finally {
        if (subscriptionType) {
          const card = document.getElementById(`plan_${subscriptionType}`);
          if (card) card.classList.remove('loading');
        }
      }
    }

    // ===== 代理编辑器 =====
    function editProxy(accountId) {
      const acct = accountsState.rows.find(r => r.id === accountId);
      const p = acct?.proxy || { proxyType: 'noproxy', host: '', port: '', proxyUserName: '', hasPassword: false };
      showModal(`
        <div class="modal-head">
          <h3>编辑代理 · #${accountId} ${esc(acct?.email || '')}</h3>
          <button class="modal-close" onclick="closeModal()">关闭</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label>类型</label>
            <select id="px_type" style="padding:.55rem; border:1px solid #ddd; border-radius:4px;">
              <option value="noproxy" ${p.proxyType === 'noproxy' ? 'selected' : ''}>不使用代理</option>
              <option value="http" ${p.proxyType === 'http' ? 'selected' : ''}>HTTP</option>
              <option value="https" ${p.proxyType === 'https' ? 'selected' : ''}>HTTPS</option>
              <option value="socks5" ${p.proxyType === 'socks5' ? 'selected' : ''}>SOCKS5</option>
              <option value="ssh" ${p.proxyType === 'ssh' ? 'selected' : ''}>SSH</option>
            </select>
          </div>
          <div class="field">
            <label>主机</label>
            <input type="text" id="px_host" placeholder="proxy.example.com" value="${esc(p.host)}">
          </div>
          <div class="field">
            <label>端口</label>
            <input type="text" id="px_port" placeholder="8080" value="${esc(p.port)}">
          </div>
          <div class="field">
            <label>用户名</label>
            <input type="text" id="px_user" value="${esc(p.proxyUserName)}">
          </div>
          <div class="field">
            <label>密码 ${p.hasPassword ? '<span class="hint">(留空表示不修改原密码)</span>' : ''}</label>
            <input type="password" id="px_pass" placeholder="${p.hasPassword ? '••••••' : ''}">
          </div>
          <div id="px_err" class="err-text"></div>
        </div>
        <div class="modal-foot">
          <button class="secondary" onclick="closeModal()">取消</button>
          <button onclick="saveProxy(${accountId})">保存</button>
        </div>
      `);
    }

    async function saveProxy(accountId) {
      const errEl = document.getElementById('px_err');
      const body = {
        proxyType: document.getElementById('px_type').value,
        host: document.getElementById('px_host').value.trim(),
        port: document.getElementById('px_port').value.trim(),
        proxyUserName: document.getElementById('px_user').value.trim()
      };
      const passField = document.getElementById('px_pass').value;
      // 只在用户输入了内容时才发 proxyPassword 字段, 否则后端保留原值
      if (passField !== '') body.proxyPassword = passField;

      try {
        const res = await fetch(`/api/admin/accounts/${accountId}/proxy`, {
          method: 'PUT',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify(body)
        });
        if (handleAuthFailure(res)) return;
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          errEl.textContent = data.error || '保存失败';
          return;
        }
        closeModal();
        loadAccounts();
      } catch (e) {
        errEl.textContent = '请求失败';
      }
    }

    if (requireLogin()) {
      loadSettings();
      loadAccounts();
      loadKeys();
      // 每 30 秒静默刷新一次，让倒计时和状态保持新
      setInterval(loadAccounts, 30000);
    }
  </script>
</body>
