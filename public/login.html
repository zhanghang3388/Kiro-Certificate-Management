<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #333; }
    .card { background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 100%; max-width: 380px; }
    h1 { font-size: 1.3rem; margin-bottom: 1.4rem; text-align: center; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #555; font-size: 0.9rem; }
    input { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 1rem; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #4f46e5; }
    button { width: 100%; background: #4f46e5; color: #fff; border: none; padding: 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
    button:hover { background: #4338ca; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .msg { margin-top: 0.9rem; padding: 0.7rem; border-radius: 4px; text-align: center; font-size: 0.88rem; }
    .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kiro 管理员登录</h1>
    <label>管理员密钥</label>
    <input type="password" id="keyInput" placeholder="请输入密钥" autofocus>
    <button id="loginBtn" onclick="login()">登录</button>
    <div id="msg"></div>
  </div>
  <script>
    const ADMIN_KEY_STORAGE = 'kiro_admin_key';

    if (localStorage.getItem(ADMIN_KEY_STORAGE)) {
      location.replace('/admin.html');
    }

    async function login() {
      const key = document.getElementById('keyInput').value.trim();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('loginBtn');
      msg.className = '';
      msg.textContent = '';
      if (!key) { msg.className = 'msg error'; msg.textContent = '请输入密钥'; return; }
      btn.disabled = true;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key })
        });
        if (res.ok) {
          localStorage.setItem(ADMIN_KEY_STORAGE, key);
          location.replace('/admin.html');
          return;
        }
        const data = await res.json().catch(() => ({}));
        msg.className = 'msg error';
        msg.textContent = data.error || '登录失败';
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = '请求失败';
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('keyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
